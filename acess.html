<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistive Eyes - Accessibility Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            background-color: #05B2DC;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .viewfinder {
            width: 95%;
            max-width: 900px;
            border: 8px solid white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            background: black;
        }
        #webcam { width: 100%; height: auto; display: block; }
        #status {
            width: 85%;
            margin-top: 25px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            font-size: 1.6rem;
            font-weight: bold;
        }
        .hint { margin-top: 10px; font-weight: bold; text-transform: uppercase; }
        #shutter { display: none; }
    </style>
</head>
<body>

    <h1>Assistive Eyes</h1>
    <h2>Accessibility Mode</h2>

    <div class="viewfinder">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="status">Initializing Camera...</div>

    <div class="hint">
        <p>Press <strong>SPACEBAR</strong> to start scanning</p>
        <p>Press <strong>R</strong> to repeat result</p>
        <p>Press <strong>ESC</strong> to stop scanning</p>
    </div>

    <canvas id="shutter"></canvas>
    <script src="acesss.js"></script>
</body>
</html>
