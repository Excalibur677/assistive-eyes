<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistive Eyes — Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060910;
            --card: #0f1520;
            --border: rgba(0,210,255,0.12);
            --border-hi: rgba(0,210,255,0.45);
            --cyan: #00d2ff;
            --cyan-glow: rgba(0,210,255,0.12);
            --t1: #e8edf5;
            --t2: #6b7fa3;
            --t3: #3a4a6b;
            --red: #ff4560;
            --grid: rgba(0,210,255,0.03);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--t1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content:'';
            position:fixed; inset:0;
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events:none;
        }

        /* Ambient glow */
        body::after {
            content:'';
            position:fixed;
            top:-150px; left:50%;
            transform:translateX(-50%);
            width:600px; height:400px;
            background: radial-gradient(ellipse, rgba(0,210,255,0.07) 0%, transparent 70%);
            pointer-events:none;
        }

        .login-box {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
            animation: fade-up 0.4s ease;
        }

        @keyframes fade-up {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            width: 52px; height: 52px;
            border: 1.5px solid var(--cyan);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 28px var(--cyan-glow);
            margin-bottom: 14px;
        }

        .login-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .login-title span { color: var(--cyan); }

        .login-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--t3);
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content:'';
            position:absolute;
            top:0; left:0; right:0;
            height: 2px;
            background: linear-gradient(90deg, var(--cyan), rgba(0,210,255,0.1));
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--t3);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: #0b0f1a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--t1);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--border-hi);
            box-shadow: 0 0 0 3px var(--cyan-glow);
        }

        .form-input::placeholder { color: var(--t3); }

        .error-msg {
            display: none;
            padding: 10px 14px;
            background: rgba(255,69,96,0.08);
            border: 1px solid rgba(255,69,96,0.25);
            border-radius: 8px;
            color: #ffb3bf;
            font-size: 0.82rem;
            margin-bottom: 16px;
            text-align: center;
        }

        .error-msg.visible { display: block; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--cyan);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .btn-login:hover {
            background: #33daff;
            box-shadow: 0 0 28px rgba(0,210,255,0.35);
            transform: translateY(-1px);
        }

        .btn-login:active { transform: translateY(0); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            color: var(--t3);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="login-logo">
            <div class="login-icon">👁</div>
            <div class="login-title">Assistive<span>Eyes</span></div>
            <div class="login-sub">Admin Access</div>
        </div>

        <div class="login-card">
            <div class="error-msg" id="errorMsg">
                ✕ &nbsp; Invalid username or password
            </div>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-input" type="text" id="username"
                       placeholder="Enter admin username" autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" id="password"
                       placeholder="Enter password"
                       onkeydown="if(event.key==='Enter') doLogin()">
            </div>

            <button class="btn-login" onclick="doLogin()">
                → &nbsp; Access Dashboard
            </button>
        </div>

        <a class="back-link" href="/">← Back to Scanner</a>
    </div>

    <script>
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errMsg   = document.getElementById('errorMsg');

            if (!username || !password) {
                errMsg.textContent = '✕  Please enter both username and password';
                errMsg.classList.add('visible');
                return;
            }

            // Get CSRF token
            const csrf = await fetch('/admin/login/?next=/dashboard/')
                .then(r => r.text())
                .then(html => {
                    const match = html.match(/csrfmiddlewaretoken.*?value="([^"]+)"/);
                    return match ? match[1] : '';
                });

            const form = new FormData();
            form.append('username', username);
            form.append('password', password);
            form.append('csrfmiddlewaretoken', csrf);
            form.append('next', '/dashboard/');

            const res = await fetch('/admin/login/?next=/dashboard/', {
                method: 'POST',
                body: form,
                redirect: 'follow',
                credentials: 'include'
            });

            if (res.url.includes('dashboard') || res.redirected) {
                window.location.href = '/dashboard/';
            } else {
                errMsg.textContent = '✕  Invalid username or password';
                errMsg.classList.add('visible');
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
