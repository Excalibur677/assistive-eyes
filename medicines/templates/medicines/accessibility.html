<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistive Eyes — Accessibility Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060910;
            --cyan: #00d2ff;
            --cyan-glow: rgba(0, 210, 255, 0.15);
            --green: #00e5a0;
            --green-glow: rgba(0, 229, 160, 0.15);
            --red: #ff4560;
            --amber: #ffb830;
            --amber-glow: rgba(255, 184, 48, 0.15);
            --text: #e8edf5;
            --dim: #3a4a6b;
            --border: rgba(0, 210, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Grid bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,210,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,210,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* ── TOP NAV ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(6,9,16,0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo span { color: var(--cyan); }

        .nav-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyan);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 50px;
            background: var(--cyan-glow);
        }

        .btn-back {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: #6b7fa3;
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .btn-back:hover {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        /* ── MAIN ORBITING RING ── */
        .orbit-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin-bottom: 40px;
        }

        /* Outer ring */
        .ring-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(0, 210, 255, 0.15);
        }

        /* Middle ring */
        .ring-mid {
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            border: 1px solid rgba(0, 210, 255, 0.08);
        }

        /* Spinning arc */
        .ring-spin {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--cyan);
            border-right-color: var(--cyan);
            animation: spin 4s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ring-spin.active {
            opacity: 1;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Center button */
        .center-btn {
            position: absolute;
            inset: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid rgba(0, 210, 255, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .center-btn:hover,
        .center-btn:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 40px var(--cyan-glow), inset 0 0 30px var(--cyan-glow);
            outline: none;
        }

        .center-btn.scanning {
            border-color: var(--amber);
            box-shadow: 0 0 40px var(--amber-glow), inset 0 0 30px var(--amber-glow);
        }

        .center-btn.success {
            border-color: var(--green);
            box-shadow: 0 0 40px var(--green-glow), inset 0 0 30px var(--green-glow);
        }

        .center-btn.error {
            border-color: var(--red);
            box-shadow: 0 0 40px rgba(255, 69, 96, 0.15), inset 0 0 30px rgba(255, 69, 96, 0.1);
        }

        .center-icon {
            font-size: 2.2rem;
            transition: all 0.3s;
        }

        .center-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #6b7fa3;
        }

        /* Orbit dots */
        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
        }

        .orbit-dot:nth-child(1) {
            animation: orbit 6s linear infinite;
        }
        .orbit-dot:nth-child(2) {
            animation: orbit 6s linear infinite;
            animation-delay: -2s;
            opacity: 0.5;
        }
        .orbit-dot:nth-child(3) {
            animation: orbit 6s linear infinite;
            animation-delay: -4s;
            opacity: 0.25;
        }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(126px) translateX(-3px) translateY(-3px); }
            to { transform: rotate(360deg) translateX(126px) translateX(-3px) translateY(-3px); }
        }

        /* ── TEXT AREA ── */
        .text-area {
            text-align: center;
            max-width: 500px;
            padding: 0 20px;
        }

        .main-msg {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            transition: all 0.4s;
            min-height: 2.5rem;
        }

        .sub-msg {
            font-size: 1rem;
            color: #6b7fa3;
            line-height: 1.7;
            min-height: 3rem;
            transition: all 0.4s;
        }

        /* ── KEYBOARD HINT ── */
        .kb-hint {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            background: #0f1520;
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-bottom: 3px solid rgba(0, 210, 255, 0.3);
            border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--cyan);
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .key.pressed {
            border-bottom-width: 1px;
            transform: translateY(2px);
            background: var(--cyan-glow);
        }

        .key-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: #3a4a6b;
            letter-spacing: 1px;
        }

        /* ── RESULT PANEL (slides up) ── */
        .result-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0b0f1a;
            border-top: 1px solid var(--border);
            padding: 24px 32px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 200;
            max-height: 60vh;
            overflow-y: auto;
        }

        .result-panel.visible {
            transform: translateY(0);
        }

        .result-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .result-med-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--green);
        }

        .result-med-generic {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: #6b7fa3;
            margin-top: 2px;
        }

        .close-btn {
            background: none;
            border: 1px solid var(--border);
            color: #6b7fa3;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            color: var(--text);
            border-color: var(--text);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .result-item {
            padding: 14px;
            background: #0f1520;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .result-item-key {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 6px;
        }

        .result-item-val {
            font-size: 0.85rem;
            color: #9aafc7;
            line-height: 1.6;
        }

        .result-warning {
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(255, 69, 96, 0.07);
            border: 1px solid rgba(255, 69, 96, 0.2);
            border-radius: 10px;
            font-size: 0.83rem;
            color: #ffb3bf;
            display: none;
        }

        .result-warning.visible { display: block; }

        .speaking-bar {
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 2px;
            color: var(--cyan);
        }

        .speaking-bar.visible { display: flex; }

        .speaking-waves {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 14px;
        }

        .wave {
            width: 3px;
            background: var(--cyan);
            border-radius: 2px;
            animation: wave-anim 1s ease-in-out infinite;
        }

        .wave:nth-child(1) { animation-delay: 0s; }
        .wave:nth-child(2) { animation-delay: 0.15s; }
        .wave:nth-child(3) { animation-delay: 0.3s; }
        .wave:nth-child(4) { animation-delay: 0.45s; }
        .wave:nth-child(5) { animation-delay: 0.6s; }

        @keyframes wave-anim {
            0%, 100% { height: 4px; }
            50% { height: 14px; }
        }

        video, canvas { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">👁 Assistive<span>Eyes</span></div>
        <div class="nav-badge">♿ Accessibility Mode</div>
        <a class="btn-back" href="/">← Visual Mode</a>
    </nav>

    <video id="videoFeed" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <!-- ORBIT UI -->
    <div class="orbit-container">
        <div class="ring-outer"></div>
        <div class="ring-mid"></div>
        <div class="ring-spin" id="ringSpinner"></div>
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>
        <div class="orbit-dot"></div>

        <button class="center-btn" id="centerBtn" onclick="performScan()" tabindex="0">
            <div class="center-icon" id="centerIcon">👁</div>
            <div class="center-label" id="centerLabel">PRESS SPACE</div>
        </button>
    </div>

    <!-- TEXT -->
    <div class="text-area">
        <div class="main-msg" id="mainMsg">Ready to Scan</div>
        <div class="sub-msg" id="subMsg">Hold a medicine label in front of your camera and press Spacebar</div>
    </div>

    <!-- KB HINT -->
    <div class="kb-hint">
        <span class="key" id="spaceKey">SPACEBAR</span>
        <span class="key-label">to scan</span>
        &nbsp;&nbsp;
        <span class="key">R</span>
        <span class="key-label">to repeat</span>
        &nbsp;&nbsp;
        <span class="key">ESC</span>
        <span class="key-label">to dismiss</span>
    </div>

    <!-- RESULT SLIDE-UP PANEL -->
    <div class="result-panel" id="resultPanel">
        <div class="result-panel-header">
            <div>
                <div class="result-med-name" id="rName">—</div>
                <div class="result-med-generic" id="rGeneric">—</div>
            </div>
            <button class="close-btn" onclick="closeResult()">✕</button>
        </div>

        <div class="speaking-bar" id="speakingBar">
            <div class="speaking-waves">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
            SPEAKING...
        </div>

        <div class="result-grid">
            <div class="result-item">
                <div class="result-item-key">Uses</div>
                <div class="result-item-val" id="rUses">—</div>
            </div>
            <div class="result-item">
                <div class="result-item-key">Dosage</div>
                <div class="result-item-val" id="rDosage">—</div>
            </div>
            <div class="result-item">
                <div class="result-item-key">Side Effects</div>
                <div class="result-item-val" id="rSideEffects">—</div>
            </div>
        </div>
        <div class="result-warning" id="rWarning">⚠ <span id="rWarningText">—</span></div>
    </div>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('canvas');
        const centerBtn = document.getElementById('centerBtn');
        const centerIcon = document.getElementById('centerIcon');
        const centerLabel = document.getElementById('centerLabel');
        const mainMsg = document.getElementById('mainMsg');
        const subMsg = document.getElementById('subMsg');
        const ringSpinner = document.getElementById('ringSpinner');
        const spaceKey = document.getElementById('spaceKey');

        let isScanning = false;
        let lastScript = '';

        function speak(text, onDone = null) {
            window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.rate = 0.92;
            utt.pitch = 1;
            utt.volume = 1;
            if (onDone) utt.onend = onDone;
            window.speechSynthesis.speak(utt);
            document.getElementById('speakingBar').classList.add('visible');
            utt.onend = () => {
                document.getElementById('speakingBar').classList.remove('visible');
                if (onDone) onDone();
            };
        }

        function setState(state) {
            centerBtn.className = 'center-btn';
            if (state === 'ready') {
                centerIcon.textContent = '👁';
                centerLabel.textContent = 'PRESS SPACE';
                ringSpinner.classList.remove('active');
            } else if (state === 'scanning') {
                centerBtn.classList.add('scanning');
                centerIcon.textContent = '⏳';
                centerLabel.textContent = 'SCANNING';
                ringSpinner.classList.add('active');
            } else if (state === 'success') {
                centerBtn.classList.add('success');
                centerIcon.textContent = '✓';
                centerLabel.textContent = 'DETECTED';
                ringSpinner.classList.remove('active');
            } else if (state === 'error') {
                centerBtn.classList.add('error');
                centerIcon.textContent = '✕';
                centerLabel.textContent = 'NOT FOUND';
                ringSpinner.classList.remove('active');
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                setState('ready');
                mainMsg.textContent = 'Ready to Scan';
                subMsg.textContent = 'Hold medicine label to camera and press Spacebar';
                speak('Assistive Eyes accessibility mode is ready. Press spacebar to scan a medicine label.');
            } catch (err) {
                setState('error');
                mainMsg.textContent = 'Camera Error';
                subMsg.textContent = err.message;
                speak('Camera error. Please check camera permissions.');
            }
        }

        async function performScan() {
            if (isScanning) return;
            isScanning = true;

            setState('scanning');
            mainMsg.textContent = 'Scanning...';
            subMsg.textContent = 'Hold the medicine label still';
            speak('Scanning. Please hold still.');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg', 0.85);

            spaceKey.classList.add('pressed');
            setTimeout(() => spaceKey.classList.remove('pressed'), 150);

            try {
                const res = await fetch('/api/scan/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });
                const data = await res.json();

                if (data.success) {
                    const m = data.medicine;
                    setState('success');
                    mainMsg.textContent = m.name;
                    subMsg.textContent = m.generic_name + ' · ' + m.category;

                    document.getElementById('rName').textContent = m.name;
                    document.getElementById('rGeneric').textContent = m.generic_name + ' · ' + m.category;
                    document.getElementById('rUses').textContent = m.uses;
                    document.getElementById('rDosage').textContent = m.dosage;
                    document.getElementById('rSideEffects').textContent = m.side_effects;

                    const warn = document.getElementById('rWarning');
                    if (m.warnings) {
                        document.getElementById('rWarningText').textContent = m.warnings;
                        warn.classList.add('visible');
                    } else {
                        warn.classList.remove('visible');
                    }

                    document.getElementById('resultPanel').classList.add('visible');

                    lastScript = `Medicine detected: ${m.name}. Also known as ${m.generic_name}. Category: ${m.category}. Used for: ${m.uses}. Dosage: ${m.dosage}. Side effects include: ${m.side_effects}. ${m.warnings ? 'Warning: ' + m.warnings : ''} Press spacebar to scan another medicine.`;

                    speak(lastScript, () => { isScanning = false; });

                } else {
                    setState('error');
                    mainMsg.textContent = 'Not Found';
                    subMsg.textContent = data.message;
                    speak(data.message + '. Press spacebar to try again.', () => {
                        isScanning = false;
                        setState('ready');
                        mainMsg.textContent = 'Ready to Scan';
                        subMsg.textContent = 'Press Spacebar to scan again';
                    });
                }
            } catch (e) {
                setState('error');
                mainMsg.textContent = 'Network Error';
                subMsg.textContent = 'Is the server running?';
                speak('Network error. Please check the server.', () => {
                    isScanning = false;
                    setState('ready');
                });
            }
        }

        function closeResult() {
            document.getElementById('resultPanel').classList.remove('visible');
            setState('ready');
            mainMsg.textContent = 'Ready to Scan';
            subMsg.textContent = 'Press Spacebar to scan a medicine label';
            isScanning = false;
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); performScan(); }
            if (e.code === 'KeyR') { if (lastScript) speak(lastScript); }
            if (e.code === 'Escape') { closeResult(); }
        });

        startCamera();
    </script>
</body>
</html>
