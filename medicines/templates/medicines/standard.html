<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistive Eyes — Medicine Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #060910;
            --bg-panel: #0b0f1a;
            --bg-card: #0f1520;
            --bg-elevated: #141c2e;
            --border: rgba(0, 210, 255, 0.12);
            --border-bright: rgba(0, 210, 255, 0.35);
            --cyan: #00d2ff;
            --cyan-dim: rgba(0, 210, 255, 0.6);
            --cyan-glow: rgba(0, 210, 255, 0.15);
            --green: #00e5a0;
            --green-glow: rgba(0, 229, 160, 0.15);
            --red: #ff4560;
            --amber: #ffb830;
            --text-primary: #e8edf5;
            --text-secondary: #6b7fa3;
            --text-dim: #3a4a6b;
            --grid-line: rgba(0, 210, 255, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient glow top */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0, 210, 255, 0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            background: rgba(6, 9, 16, 0.8);
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            border: 1.5px solid var(--cyan);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--cyan-glow), inset 0 0 10px var(--cyan-glow);
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .logo-text span {
            color: var(--cyan);
        }

        .logo-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .btn-accessibility {
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-accessibility:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: var(--cyan-glow);
        }

        /* ── MAIN LAYOUT ── */
        main {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 0;
            height: calc(100vh - 79px);
        }

        /* ── LEFT: CAMERA SECTION ── */
        .camera-section {
            padding: 30px 30px 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--border);
        }

        .section-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .camera-frame {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
            flex: 1;
            min-height: 0;
        }

        /* Corner accents */
        .camera-frame::before,
        .camera-frame::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            z-index: 10;
        }
        .camera-frame::before {
            top: 12px; left: 12px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
            border-radius: 4px 0 0 0;
        }
        .camera-frame::after {
            bottom: 12px; right: 12px;
            border-bottom: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
            border-radius: 0 0 4px 0;
        }

        /* More corners via wrapper */
        .corner-tr, .corner-bl {
            position: absolute;
            width: 24px;
            height: 24px;
            z-index: 10;
        }
        .corner-tr {
            top: 12px; right: 12px;
            border-top: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
            border-radius: 0 4px 0 0;
        }
        .corner-bl {
            bottom: 12px; left: 12px;
            border-bottom: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
            border-radius: 0 0 0 4px;
        }

        #videoFeed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Scan line animation */
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            box-shadow: 0 0 12px var(--cyan);
            animation: scan-sweep 3s ease-in-out infinite;
            opacity: 0;
            z-index: 5;
        }

        .scan-line.active {
            opacity: 1;
        }

        @keyframes scan-sweep {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        /* Crosshair overlay */
        .crosshair {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 4;
        }

        .crosshair-inner {
            width: 120px;
            height: 80px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 4px;
            position: relative;
        }

        /* ── BOTTOM CONTROLS ── */
        .controls-bar {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-scan {
            flex: 1;
            padding: 16px;
            background: var(--cyan);
            color: #060910;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .btn-scan:hover {
            background: #33daff;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-scan:active {
            transform: translateY(0);
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-bar {
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-width: 180px;
            text-align: center;
        }

        /* ── RIGHT: RESULTS PANEL ── */
        .results-panel {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: var(--bg-panel);
        }

        .panel-header {
            padding: 30px 28px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-panel);
            z-index: 5;
        }

        .panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .panel-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .panel-body {
            padding: 24px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0.4;
            padding: 40px 0;
        }

        .empty-icon {
            font-size: 3rem;
            filter: grayscale(1);
        }

        .empty-text {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Result Card */
        .result-card {
            display: none;
            flex-direction: column;
            gap: 0;
            animation: slide-in 0.4s ease;
        }

        .result-card.visible {
            display: flex;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Medicine header */
        .med-header {
            padding: 20px;
            background: var(--bg-elevated);
            border-radius: 12px 12px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            position: relative;
            overflow: hidden;
        }

        .med-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--cyan), var(--green));
        }

        .med-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .med-generic {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--cyan-dim);
            margin-bottom: 12px;
        }

        .med-badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--cyan-glow);
            border: 1px solid var(--border-bright);
            border-radius: 50px;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--cyan);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Info rows */
        .info-grid {
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }

        .info-row {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 12px;
            align-items: start;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row:nth-child(even) {
            background: rgba(0, 210, 255, 0.02);
        }

        .info-key {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            padding-top: 2px;
        }

        .info-val {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Warning block */
        .warning-block {
            padding: 14px 16px;
            background: rgba(255, 69, 96, 0.08);
            border: 1px solid rgba(255, 69, 96, 0.25);
            border-radius: 10px;
            display: none;
            gap: 10px;
            align-items: flex-start;
        }

        .warning-block.visible {
            display: flex;
        }

        .warning-icon {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .warning-text {
            font-size: 0.82rem;
            color: #ffb3bf;
            line-height: 1.6;
        }

        /* Error state */
        .error-card {
            display: none;
            padding: 16px;
            background: rgba(255, 69, 96, 0.07);
            border: 1px solid rgba(255, 69, 96, 0.2);
            border-radius: 12px;
            gap: 10px;
            align-items: flex-start;
            animation: slide-in 0.3s ease;
        }

        .error-card.visible {
            display: flex;
        }

        .error-text {
            font-size: 0.85rem;
            color: #ffb3bf;
            line-height: 1.5;
        }

        /* ── SCROLLBAR ── */
        .results-panel::-webkit-scrollbar { width: 4px; }
        .results-panel::-webkit-scrollbar-track { background: transparent; }
        .results-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        canvas { display: none; }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; height: auto; }
            .camera-section { border-right: none; border-bottom: 1px solid var(--border); min-height: 70vh; }
            .results-panel { max-height: 80vh; }
            header { padding: 16px 20px; }
            .camera-section { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <div class="logo-icon">👁</div>
            <div>
                <div class="logo-text">Assistive<span>Eyes</span></div>
                <div class="logo-sub">Medicine Scanner</div>
            </div>
        </div>
        <div class="header-right">
            <div class="status-pill">
                <div class="status-dot"></div>
                SYSTEM ONLINE
            </div>
            <a class="btn-accessibility" href="/accessibility/">
                🎧 Blind Mode
            </a>
            <a class="btn-accessibility" href="/admin-login/" style="border-color: rgba(0,210,255,0.3); color: #00d2ff;">
                🔐 Admin
            </a>
        </div>
    </header>

    <!-- MAIN -->
    <main>

        <!-- LEFT: CAMERA -->
        <div class="camera-section">
            <div class="section-label">Live Camera Feed</div>

            <div class="camera-frame" id="cameraFrame">
                <div class="corner-tr"></div>
                <div class="corner-bl"></div>
                <div class="scan-line" id="scanLine"></div>
                <div class="crosshair">
                    <div class="crosshair-inner"></div>
                </div>
                <video id="videoFeed" autoplay playsinline></video>
            </div>

            <div class="controls-bar">
                <button class="btn-scan" id="captureBtn" onclick="captureImage()">
                    ⬡ &nbsp;SCAN MEDICINE
                </button>
                <div class="status-bar" id="statusBar">CAMERA INITIALIZING</div>
            </div>
        </div>

        <!-- RIGHT: RESULTS -->
        <div class="results-panel">
            <div class="panel-header">
                <div class="panel-title">Scan Results</div>
                <div class="panel-sub">Medical Information Database</div>
            </div>
            <div class="panel-body" id="panelBody">

                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">⬡</div>
                    <div class="empty-text">No scan yet<br>Point camera at medicine label</div>
                </div>

                <!-- Result Card -->
                <div class="result-card" id="resultCard">
                    <div class="med-header">
                        <div class="med-name" id="medName">—</div>
                        <div class="med-generic" id="medGeneric">—</div>
                        <span class="med-badge" id="medBadge">—</span>
                    </div>
                    <div class="info-grid">
                        <div class="info-row">
                            <div class="info-key">Uses</div>
                            <div class="info-val" id="medUses">—</div>
                        </div>
                        <div class="info-row">
                            <div class="info-key">Dosage</div>
                            <div class="info-val" id="medDosage">—</div>
                        </div>
                        <div class="info-row">
                            <div class="info-key">Side Effects</div>
                            <div class="info-val" id="medSideEffects">—</div>
                        </div>
                    </div>
                    <div class="warning-block" id="warningBlock">
                        <div class="warning-icon">⚠</div>
                        <div class="warning-text" id="medWarnings">—</div>
                    </div>
                </div>

                <!-- Error Card -->
                <div class="error-card" id="errorCard">
                    <div>⚠</div>
                    <div class="error-text" id="errorMsg">—</div>
                </div>

            </div>
        </div>
    </main>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('canvas');
        const statusBar = document.getElementById('statusBar');
        const scanLine = document.getElementById('scanLine');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                statusBar.textContent = 'CAMERA READY';
            } catch (err) {
                statusBar.textContent = 'CAMERA ERROR';
            }
        }

        async function captureImage() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg', 0.85);

            statusBar.textContent = 'SCANNING...';
            scanLine.classList.add('active');
            document.getElementById('captureBtn').disabled = true;
            document.getElementById('resultCard').classList.remove('visible');
            document.getElementById('errorCard').classList.remove('visible');
            document.getElementById('emptyState').style.display = 'none';

            try {
                const res = await fetch('/api/scan/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });
                const data = await res.json();

                scanLine.classList.remove('active');

                if (data.success) {
                    displayResult(data.medicine);
                    statusBar.textContent = 'DETECTED ✓';
                } else {
                    showError(data.message);
                    statusBar.textContent = 'NOT FOUND';
                }
            } catch (e) {
                scanLine.classList.remove('active');
                showError('Network error. Is the server running?');
                statusBar.textContent = 'ERROR';
            }

            document.getElementById('captureBtn').disabled = false;
        }

        function displayResult(m) {
            document.getElementById('medName').textContent = m.name;
            document.getElementById('medGeneric').textContent = m.generic_name || '—';
            document.getElementById('medBadge').textContent = m.category || '—';
            document.getElementById('medUses').textContent = m.uses;
            document.getElementById('medDosage').textContent = m.dosage;
            document.getElementById('medSideEffects').textContent = m.side_effects;

            const warn = document.getElementById('warningBlock');
            if (m.warnings) {
                document.getElementById('medWarnings').textContent = m.warnings;
                warn.classList.add('visible');
            } else {
                warn.classList.remove('visible');
            }

            document.getElementById('resultCard').classList.add('visible');
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorCard').classList.add('visible');
        }

        startCamera();
    </script>
</body>
</html>
